<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart</title>

  <!-- Google Fonts for nice "Your Cart" title -->
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: white;
      color: #333;
      overflow: hidden;
    }
    #cart-container {
      position: fixed;
      top: 0;
      right: 0;
      width: 100%;
      height: 100%;
      background: white;
      box-shadow: -8px 0 25px rgba(0,0,0,0.25);
      transform: translateX(100%);
      transition: transform 0.4s ease-in-out;
      z-index: 9999; /* high but below potential modals if any */
      overflow-y: auto;
      padding: 20px 15px;
    }
    #cart-container.open {
      transform: translateX(0);
    }
    .cart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      padding-bottom: 15px;
      border-bottom: 1px solid #eee;
    }
    .cart-title {
      font-family: 'Archivo Black', Arial, sans-serif;
      font-size: 1.9rem;
      margin: 0;
      color: #000;
    }
    .cart-close {
      background: #f0f0f0;
      border: none;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      font-size: 1.7rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      transition: all 0.2s;
    }
    .cart-close:hover {
      background: #e0e0e0;
      color: #000;
    }
    .cart-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: #f9f9f9;
      border-radius: 10px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .cart-item img {
      width: 65px;
      height: 65px;
      object-fit: contain;
      border-radius: 8px;
      background: white;
      border: 1px solid #eee;
    }
    .cart-item-title {
      font-weight: 600;
      font-size: 1rem;
      color: #333;
      margin: 0;
    }
    .cart-empty {
      text-align: center;
      color: #777;
      font-size: 1.05rem;
      padding: 50px 0;
    }
    #inquire-cart {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 90%;
      margin: 35px auto 20px;
      background: #25D366;
      color: white;
      font-weight: 600;
      font-size: 1.05rem;
      padding: 12px 24px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3);
      transition: all 0.3s;
    }
    #inquire-cart:hover {
      background: #128C7E;
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(37, 211, 102, 0.45);
    }
    #inquire-cart i {
      font-size: 1.4rem;
    }

    /* Mobile adjustments */
    @media (max-width: 768px) {
      #cart-container {
        width: 100%;
        max-width: none;
      }
      .cart-title {
        font-size: 1.7rem;
      }
      .cart-item img {
        width: 60px;
        height: 60px;
      }
      #inquire-cart {
        width: 95%;
        padding: 12px 20px;
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

  <!-- Cart Container (slides from right) -->
  <div id="cart-container">
    <div class="cart-header">
      <h2 class="cart-title">Your Cart</h2>
      <button class="cart-close" id="cart-close">×</button>
    </div>

    <div id="cart-content">
      <!-- Cart items inserted here -->
    </div>

    <button id="inquire-cart">
      <i class="fab fa-whatsapp"></i>
      Inquire these products
    </button>
  </div>

  <script>
    // Cart logic
    let cart = JSON.parse(localStorage.getItem('cart') || '[]');

    const cartContainer = document.getElementById('cart-container');
    const cartContent = document.getElementById('cart-content');
    const inquireBtn = document.getElementById('inquire-cart');
    const closeBtn = document.getElementById('cart-close');

    function renderCart() {
      cartContent.innerHTML = '';
      if (cart.length === 0) {
        cartContent.innerHTML = '<p class="cart-empty">Your cart is empty.</p>';
      } else {
        cart.forEach(product => {
          const item = document.createElement('div');
          item.className = 'cart-item';
          item.innerHTML = `
            <img src="${product.image}" alt="${product.title}">
            <span class="cart-item-title">${product.title}</span>
          `;
          cartContent.appendChild(item);
        });
      }
      // Send count to parent window
      window.parent.postMessage({ type: 'cartUpdate', count: cart.length }, '*');
    }

    function openCart() {
      cartContainer.classList.add('open');
    }
    function closeCart() {
      cartContainer.classList.remove('open');
    }

    closeBtn.addEventListener('click', closeCart);

    inquireBtn.addEventListener('click', () => {
      if (cart.length === 0) {
        alert('Your cart is empty.');
        return;
      }
      const titles = cart.map(p => p.title).join(', ');
      const message = encodeURIComponent(`Good day, I'd like to inquire about the following products: ${titles}`);
      window.open(`https://wa.me/26771665187?text=${message}`, '_blank');
    });

    // Listen for add-to-cart from parent
    window.addEventListener('message', (e) => {
      if (e.data.type === 'addToCart') {
        cart.push(e.data.product);
        localStorage.setItem('cart', JSON.stringify(cart));
        renderCart();
      }
    });

    // Initial render
    renderCart();

    // Expose openCart for parent window
    window.openCart = openCart;
  </script>
</body>
</html>
